services:
  buzz-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: buzz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required, set via Coolify env}
      POSTGRES_DB: buzz
    volumes:
      - buzz-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buzz"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  buzz-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - buzz-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m

  buzz-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?required, set via Coolify env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required, set via Coolify env}
    volumes:
      - buzz-minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  # media bucket を冪等に作成する one-shot job (redeploy 毎に走るが --ignore-existing で無害)
  buzz-minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      buzz-minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - mc alias set local http://buzz-minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" && mc mb --ignore-existing local/buzz-media

  buzz:
    image: ghcr.io/block/buzz:latest
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      # image が 3000/8080/9102 の 3 port を EXPOSE するため、
      # Traefik docker provider が backend port を auto 推測できず
      # service が register されない (= HTTPS 500 連発)。 web port を明示
      - "traefik.http.services.buzz.loadbalancer.server.port=3000"
    depends_on:
      buzz-db:
        condition: service_healthy
      buzz-redis:
        condition: service_healthy
      buzz-minio:
        condition: service_healthy
    environment:
      BUZZ_BIND_ADDR: 0.0.0.0:3000
      RELAY_URL: wss://buzz.takashiaihara.site
      BUZZ_MEDIA_BASE_URL: https://buzz.takashiaihara.site/media
      RELAY_OWNER_PUBKEY: ${RELAY_OWNER_PUBKEY:?required, set via Coolify env}
      BUZZ_RELAY_PRIVATE_KEY: ${BUZZ_RELAY_PRIVATE_KEY:?required, set via Coolify env}
      BUZZ_AUTO_MIGRATE: "true"
      DATABASE_URL: postgres://buzz:${POSTGRES_PASSWORD}@buzz-db:5432/buzz
      REDIS_URL: redis://buzz-redis:6379
      BUZZ_S3_ENDPOINT: http://buzz-minio:9000
      BUZZ_S3_BUCKET: buzz-media
      BUZZ_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      BUZZ_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # git state は S3 バックド (repo は S3 から ephemeral hydrate) なので volume 不要
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/_liveness"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  buzz-pg:
  buzz-redis:
  buzz-minio:
