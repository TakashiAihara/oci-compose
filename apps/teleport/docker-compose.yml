services:
  teleport:
    image: public.ecr.aws/gravitational/teleport-distroless:18.9.1
    container_name: teleport
    restart: unless-stopped
    expose:
      - "3080"
    volumes:
      - teleport-data:/var/lib/teleport
      - ./config/teleport.yaml:/etc/teleport.yaml:ro
      - /data/coolify/proxy/certs/certificates:/certs:ro
    command: ["-c", "/etc/teleport.yaml"]
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.teleport.rule=HostSNI(`teleport.takashiaihara.site`)"
      - "traefik.tcp.routers.teleport.entrypoints=https"
      - "traefik.tcp.routers.teleport.tls.passthrough=true"
      - "traefik.tcp.services.teleport.loadbalancer.server.port=3080"

volumes:
  teleport-data:
