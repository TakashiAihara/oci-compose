services:
  oci-nsg-sync:
    build: .
    image: oci-nsg-sync:local
    restart: unless-stopped
    environment:
      NSG_OCID: ${NSG_OCID:?NSG_OCID required, set via Coolify env}
      DDNS_DOMAIN: ${DDNS_DOMAIN:-aihara.online}
      # 管理対象 rule のリスト。旧 INGRESS_PORT/INGRESS_PROTOCOL より優先される
      MANAGED_RULES: ${MANAGED_RULES:-443/tcp}
      DNS_RESOLVER: ${DNS_RESOLVER:-1.1.1.1}
      TZ: Asia/Tokyo
    volumes:
      - oci-nsg-sync-state:/var/lib/oci-nsg-sync
    cap_drop:
      - all
    cap_add:
      - SETGID
      - SETUID

volumes:
  oci-nsg-sync-state:
