services:
  oci-nsg-sync:
    build: .
    image: oci-nsg-sync:local
    restart: unless-stopped
    environment:
      NSG_OCID: ${NSG_OCID:?NSG_OCID required, set via Coolify env}
      DDNS_DOMAIN: ${DDNS_DOMAIN:-aihara.online}
      INGRESS_PORT: ${INGRESS_PORT:-443}
      INGRESS_PROTOCOL: ${INGRESS_PROTOCOL:-6}
      DNS_RESOLVER: ${DNS_RESOLVER:-1.1.1.1}
      TZ: Asia/Tokyo
    volumes:
      - oci-nsg-sync-state:/var/lib/oci-nsg-sync
    cap_drop:
      - all
    cap_add:
      - SETGID
      - SETUID

volumes:
  oci-nsg-sync-state:
