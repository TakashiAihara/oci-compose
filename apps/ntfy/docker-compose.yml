services:
  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve
    expose:
      - "80"
    environment:
      NTFY_BASE_URL: https://ntfy.takashiaihara.site
      NTFY_AUTH_FILE: /var/lib/ntfy/auth/user.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_BEHIND_PROXY: "true"
      NTFY_ATTACHMENT_CACHE_DIR: /var/lib/ntfy/attachments
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_SMTP_SENDER_ADDR: smtp:587
      NTFY_SMTP_SENDER_FROM: noreply@takashiaihara.site
    volumes:
      - ntfy-auth:/var/lib/ntfy/auth
      - ntfy-cache:/var/cache/ntfy
      - ntfy-attachments:/var/lib/ntfy/attachments
      - ./config:/etc/ntfy

volumes:
  ntfy-auth:
  ntfy-cache:
  ntfy-attachments:
