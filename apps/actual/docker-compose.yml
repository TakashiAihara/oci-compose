services:
  actual:
    image: actualbudget/actual-server:latest
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      TZ: Asia/Tokyo
    volumes:
      - actual-data:/data
    healthcheck:
      test: ["CMD-SHELL", "node src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  actual-data:
