services:
  9router:
    image: decolua/9router:latest
    restart: unless-stopped
    ports:
      - "20128:20128"
    environment:
      TZ: Asia/Tokyo
      NODE_ENV: production
      DATA_DIR: /app/data
      PORT: "20128"
      HOSTNAME: "0.0.0.0"
      REQUIRE_API_KEY: "true"
      AUTH_COOKIE_SECURE: "true"
      INITIAL_PASSWORD: ${INITIAL_PASSWORD:?required, set via Coolify env}
      JWT_SECRET: ${JWT_SECRET:?required, set via Coolify env}
    volumes:
      - 9router-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:20128/api/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  9router-data:
